name: build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            binary: sublinke-linux-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            binary: sublinke-linux-arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            binary: sublinke-windows-amd64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install frontend deps
        working-directory: webs
        run: pnpm install --no-frozen-lockfile

      - name: Build frontend
        working-directory: webs
        run: pnpm build

      - name: Prepare static assets (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          rm -rf static
          cp -r webs/dist static

      - name: Prepare static assets (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          if (Test-Path "static") { Remove-Item -Recurse -Force "static" }
          Copy-Item -Recurse "webs/dist" "static"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -tags prod -ldflags="-s -w" -o ${{ matrix.binary }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}
